structure:
  type: hypotheses/lrh
  description: >
    Строгая формулировка Linear Representation Hypothesis: признаки кодируются
    как линейные направления в activation space, и модель выполняет линейные
    операции над ними (antonym = reflection, negation = negation). Авторы
    вводят понятие «лжецов» (liars) — контрпримеров, когда линейный зонд
    противоречит реальному поведению модели. Показывают: структура activation
    space изоморфна логической структуре понятий в данных.

