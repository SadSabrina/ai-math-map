    summary: "Замкнутое однородное многообразие постоянной положительной кривизны. LayerNorm проецирует все активации на единичную гиперсферу Sⁿ⁻¹.",
    content: `<h3>Определение</h3>
<p>Единичная <span class="math">n</span>-сфера: <span class="math">Sⁿ = {x ∈ ℝⁿ⁺¹ : ‖x‖ = 1}</span>. Для активаций трансформера размерности <span class="math">d</span> — гиперсфера <span class="math">S^{d−1} ⊂ ℝ^d</span>.</p>
<h3>LayerNorm и сфера</h3>
<p>LayerNorm нормирует активации: <span class="math">x̂ = (x − μ)/σ</span>, затем масштабирует через обучаемые параметры. После нормализации вектор лежит на (масштабированной) гиперсфере: расстояния определяются косинусным сходством, а не евклидовым.</p>
<h3>Эмпирические свидетельства</h3>
<p>Прямых свидетельств «семантических» структур именно на сфере в LLM пока мало. Но косинусное сходство как стандартная метрика косвенно использует сферическую геометрию. Открытая область для исследований.</p>
<h3>Отличие от тора</h3>
<p>Тор не вкладывается в <span class="math">ℝ²</span> без самопересечений. Сфера — вкладывается в <span class="math">ℝ³</span>. Топология: <span class="math">π₁(S²) = 0</span>, <span class="math">π₁(T²) = ℤ²</span>.</p>`
  }
},

"manifolds-affine": {

    summary: "Linear subspace with an offset: A = x₀ + V. Flat, open manifold of zero curvature. Unlike a linear subspace, need not pass through the origin.",
    content: `<h3>Definition</h3>
<p>An affine subspace: <span class="math">A = x₀ + V = {x₀ + v : v ∈ V}</span>, where <span class="math">V ⊂ ℝ^d</span> is a linear subspace and <span class="math">x₀</span> is an offset point. The dimension of <span class="math">A</span> equals the dimension of <span class="math">V</span>.</p>
<blockquote>A line not passing through the origin is a 1-dimensional affine subspace.</blockquote>
<h3>Difference from a linear subspace</h3>
<p>A linear subspace must contain <span class="math">0</span>; an affine subspace need not. In LLMs this matters: concept representations are often not centred at the zero vector.</p>
<h3>Connection to LLMs</h3>
<p>When an activation cloud for some class (e.g. proper nouns) has linear structure but does not pass through the origin, that cloud is an affine subspace. Parallel affine subspaces (same <span class="math">V</span>, different <span class="math">x₀</span>) correspond to concepts of the same "type" in different "contexts".</p>`
  },
  ru: {

    summary: "Линейное подпространство со сдвигом: A = x₀ + V. Плоское, незамкнутое многообразие нулевой кривизны. Не обязано проходить через начало координат.",
    content: `<h3>Определение</h3>
<p>Аффинное подпространство: <span class="math">A = x₀ + V = {x₀ + v : v ∈ V}</span>, где <span class="math">V ⊂ ℝ^d</span> — линейное подпространство, <span class="math">x₀</span> — точка сдвига.</p>

<h3>Отличие от линейного подпространства</h3>
<p>Линейное подпространство обязано содержать <span class="math">0</span>. Аффинное — нет. В контексте LLM это важно: репрезентации концептов часто не центрированы вокруг нулевого вектора.</p>
<h3>Связь с LLM</h3>
<p>Когда «облако» активаций для некоторого класса имеет линейную структуру, но не проходит через начало — это аффинное подпространство. Параллельные аффинные подпространства (одно <span class="math">V</span>, разные <span class="math">x₀</span>) соответствуют концептам одной «категории» в разных «контекстах».</p>`

"linear-separability": {
  type: "concept", viz: "linear_sep",
  en: {
    title: "Linear separability",
    summary: "Two activation classes are linearly separable if a hyperplane can separate them — necessary condition for linear feature representations; tested via linear probing.",
    content: `<h3>Definition</h3>
<p>Two sets <span class="math">A, B ⊂ ℝ^d</span> are <strong>linearly separable</strong> if there exist <span class="math">w ∈ ℝ^d, b ∈ ℝ</span> such that <span class="math">w·x + b > 0</span> for all <span class="math">x ∈ A</span> and <span class="math">w·x + b < 0</span> for all <span class="math">x ∈ B</span>. The hyperplane <span class="math">{x : w·x + b = 0}</span> is the decision boundary.</p>
<blockquote>In ℝ²: cut two point clouds with a line. In ℝᵈ: cut with a hyperplane.</blockquote>
<h3>Margin</h3>
<p>The quality of separation is the minimum distance from any point to the hyperplane: <span class="math">margin = min_{x∈A∪B} |w·x + b| / ‖w‖</span>. A large margin indicates stable, semantically clean feature encoding.</p>
<h3>Connection to linear probing</h3>
<p>A linear probe (logistic regression on activations) achieves high accuracy if and only if the feature is linearly separable. This is the main operational test for LRH. Note: linear separability is a property of a specific activation dataset, not a claim about the nature of representations in general.</p>
<h3>When it breaks down</h3>
<p><strong>Superposition:</strong> multiple features in one direction → clouds are mixed. <strong>Polysemanticity:</strong> a neuron activates on unrelated concepts. <strong>Context-dependence:</strong> one word has different representations in different contexts.</p>`
  },
  ru: {
    title: "Линейная разделимость",
    summary: "Два класса активаций линейно разделимы, если их можно разрезать гиперплоскостью. Необходимое условие линейных репрезентаций; проверяется через linear probing.",
    content: `<h3>Определение</h3>
<p>Два множества <span class="math">A, B ⊂ ℝ^d</span> <strong>линейно разделимы</strong>, если существует <span class="math">w ∈ ℝ^d, b ∈ ℝ</span> такие, что <span class="math">w·x + b > 0</span> для всех <span class="math">x ∈ A</span> и <span class="math">w·x + b < 0</span> для всех <span class="math">x ∈ B</span>.</p>
<blockquote>В ℝ²: разрезать два облака прямой. В ℝᵈ: разрезать гиперплоскостью.</blockquote>
<h3>Отступ (margin)</h3>
<p>Качество разделения: <span class="math">margin = min_{x∈A∪B} |w·x + b| / ‖w‖</span>. Большой margin → устойчивое и семантически чёткое кодирование.</p>
<h3>Связь с linear probing</h3>
<p>Linear probe достигает высокой точности ⟺ признак линейно разделим. Это основной операциональный тест для LRH. Линейная разделимость — свойство конкретного датасета активаций, не утверждение о природе репрезентаций в целом.</p>
<h3>Когда нарушается</h3>
<p><strong>Суперпозиция:</strong> несколько признаков в одном направлении → облака перемешаны. <strong>Полисемантичность:</strong> нейрон активируется на несвязанные концепты. <strong>Контекстная зависимость:</strong> одно слово имеет разные репрезентации в разных контекстах.</p>`
  }
},

"linear-direction": {
  type: "structure", viz: "linear_dir",
  en: {
    title: "Linear direction",
    summary: "Unit vector rᶠ ∈ ℝᵈ encoding feature f. The projection rᶠ · x monotonically reflects the feature's value in the context defining activation x.",
    content: `<h3>Formal definition</h3>
<p>For feature <span class="math">f</span> — a vector <span class="math">r_f ∈ ℝ^d</span>, <span class="math">‖r_f‖ = 1</span>, such that the dot product <span class="math">r_f · x</span> monotonically reflects the "value" of feature <span class="math">f</span> in the context that generates activation <span class="math">x</span>.</p>
<h3>Classic examples</h3>
<table>
<tr><th>Feature</th><th>How the direction is found</th></tr>
<tr><td>Gender direction</td><td>Bolukbasi et al. 2016: PCA on pairs he/she, king/queen</td></tr>
<tr><td>Truth direction</td><td>Marks & Tegmark 2023: logistic regression on true/false statements</td></tr>
<tr><td>Sentiment direction</td><td>Probing on positive/negative sentiment examples</td></tr>
</table>
<h3>How to find a direction</h3>
<p>1. Collect pairs (activation, feature_value). 2. Train a linear classifier or regression: the weight vector <span class="math">w</span> is a candidate for <span class="math">r_f</span>. 3. Normalise: <span class="math">r_f = w/‖w‖</span>. 4. Validate via causal intervention: add <span class="math">α·r_f</span> to the activation and verify that behaviour changes as expected.</p>`
  },
  ru: {
    title: "Линейное направление",
    summary: "Единичный вектор rᶠ ∈ ℝᵈ, кодирующий признак f. Проекция активации x на rᶠ монотонно связана со значением признака в данном контексте.",
    content: `<h3>Формальное определение</h3>
<p>Для признака <span class="math">f</span> — вектор <span class="math">r_f ∈ ℝ^d</span>, <span class="math">‖r_f‖ = 1</span>, такой что скалярное произведение <span class="math">r_f · x</span> монотонно связано со «значением» признака <span class="math">f</span> для контекста, задающего активацию <span class="math">x</span>.</p>
<h3>Классические примеры</h3>
<table>
<tr><th>Признак</th><th>Нахождение направления</th></tr>
<tr><td>Gender direction</td><td>Bolukbasi et al. 2016: PCA на парах he/she, king/queen</td></tr>
<tr><td>Truth direction</td><td>Marks & Tegmark 2023: logistic regression на истинных/ложных утверждениях</td></tr>

<h3>Как найти направление</h3>
<p>1. Собрать пары (активация, значение_признака). 2. Обучить линейный классификатор: вектор весов <span class="math">w</span> — кандидат на <span class="math">r_f</span>. 3. Нормировать: <span class="math">r_f = w/‖w‖</span>. 4. Проверить через causal intervention: добавить <span class="math">α·r_f</span> к активации и проверить изменение поведения.</p>`

},

"linear-subspace": {
  type: "structure", viz: "linear_sub",
  en: {
    title: "Linear subspace",
    summary: "k-dimensional linear subspace V ⊂ ℝᵈ corresponding to a group of related features. Generalises the single feature direction to the multidimensional case.",
    content: `<h3>Definition</h3>
<p>A linear subspace of dimension <span class="math">k</span>: <span class="math">V = span{e₁, ..., eₖ} ⊂ ℝ^d</span>, with orthonormal basis <span class="math">e₁, ..., eₖ</span>. Projection of an activation onto <span class="math">V</span>: <span class="math">P_V x = ∑ᵢ (eᵢ·x)eᵢ</span>.</p>
<h3>When a subspace rather than a direction</h3>
<p>"Part of speech" is not binary: noun, verb, adjective… Each class defines its own direction; together they span a k-dimensional subspace. Projecting onto this subspace "extracts" syntactic information while removing semantics.</p>
<h3>Finding a subspace</h3>
<p>PCA on activation differences (concept erasure), LEACE, or SVD on a matrix of contrastive pairs. A linear classifier with k > 1 outputs implicitly discovers a k-dimensional subspace through its weight matrix.</p>`
  },
  ru: {
    title: "Линейное подпространство",
    summary: "k-мерное линейное подпространство V ⊂ ℝᵈ, соответствующее группе связанных признаков. Обобщение направления на многомерный случай.",
    content: `<h3>Определение</h3>
<p>Линейное подпространство размерности <span class="math">k</span>: <span class="math">V = span{e₁, ..., eₖ} ⊂ ℝ^d</span>. Проекция активации: <span class="math">P_V x = ∑ᵢ (eᵢ·x)eᵢ</span>.</p>
<h3>Когда нужно подпространство, а не направление</h3>
<p>Признак «часть речи» — не бинарный: существительное, глагол, прилагательное... Каждый класс задаёт своё направление; все вместе они образуют k-мерное подпространство.</p>
<h3>Нахождение подпространства</h3>
<p>PCA на разностях активаций (concept erasure), LEACE, или SVD на матрице контрастных пар. Линейный классификатор с k > 1 выходами неявно обнаруживает k-мерное подпространство через веса.</p>`
  }
},

    content: `<h3>Statement</h3>
<p>For each feature <span class="math">f</span> there exists a unit vector <span class="math">r_f ∈ ℝ^d</span> such that the projection <span class="math">r_f · x</span> monotonically reflects the "value" of <span class="math">f</span> in the context generating activation <span class="math">x</span>.</p>
<p><strong>Strong version:</strong> linear operations on directions correspond to semantic operations. Antonym → reflection through a hyperplane. Negation → sign flip of the projection.</p>
<h3>Key evidence</h3>
<table>
<tr><th>Phenomenon</th><th>Interpretation</th></tr>
<tr><td>Word2Vec: king−man+woman≈queen</td><td>"Gender" is a linear direction in embedding space</td></tr>
<tr><td>Linear probes reach SOTA</td><td>Features are linearly separable → likely linearly encoded</td></tr>
<tr><td>Activation steering works</td><td>Adding r_f to an activation changes behaviour predictably</td></tr>

<h3>Connection to Platonic Rep.</h3>

"platonic-representation": {
  type: "hypothesis", viz: "platonic",
  en: {
    title: "Platonic Representation Hypothesis",
    summary: "Different neural networks — regardless of architecture and training modality — converge to a single representation of reality, measured via Centered Kernel Alignment (CKA).",
    content: `<h3>Statement</h3>

let selectedId = null;
let lang = "en";

function toggleLang() {
  lang = lang === "en" ? "ru" : "en";
  document.getElementById("lang-btn").textContent = lang === "en" ? "RU" : "EN";
  buildTree();
  if (selectedId) showTheory(selectedId);
  else document.getElementById("theory-panel").innerHTML =
    `<div class="placeholder">${lang === "en" ? "← Select a node to read theory" : "← Выберите узел в дереве"}</div>`;
}

function buildTree() {
  const panel = document.getElementById("tree-panel");
  const W = panel.clientWidth - 8;

  const root = d3.hierarchy(taxonomy);
  // nodeSize: [vertical spacing, horizontal depth step]
  d3.tree().nodeSize([24, 110])(root);

  // Skip root node; shift y so categories start at left edge
  const nodes = root.descendants().slice(1);
  nodes.forEach(d => { d.y -= 110; }); // categories → y=0, leaves → y=110

  const links = root.links().filter(l => l.source !== root);

  const xs = nodes.map(d => d.x);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const H = maxX - minX + 40;

  const svg = d3.select("#tree-svg")
    .attr("width", W)
    .attr("height", H);
  svg.selectAll("*").remove();

  const g = svg.append("g")
    .attr("transform", `translate(14, ${20 - minX})`);

  // Links
  g.selectAll(".link")
    .data(links)
    .join("path")
    .attr("class", "link")
    .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

  // Nodes
  const node = g.selectAll(".node")
    .data(nodes)
    .join("g")
    .attr("class", d => `node node--${d.data.type}`)
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .on("click", (event, d) => {
      selectedId = d.data.id;
      g.selectAll(".node").classed("selected", n => n.data.id === selectedId);
      showTheory(d.data.id);
    });

  node.append("circle")
    .attr("r", d => d.depth === 1 ? 6 : 4)
    .attr("stroke-dasharray", d => d.data.type === "concept" ? "3 2" : null);

  node.append("text")
    .attr("dx", d => d.depth === 1 ? 10 : 9)
    .attr("dominant-baseline", "middle")
    .attr("font-size", d => d.depth === 1 ? "12.5px" : "11.5px")
    .attr("font-weight", d => d.depth === 1 ? "bold" : "normal")
    .attr("font-style", d => d.data.type === "hypothesis" ? "italic" : "normal")
    .attr("fill", d => d.depth === 1 ? "#111" : "#333")
    .text(d => d.data[`lt_${lang}`] || d.data[`label_${lang}`] || d.data.lt || d.data.label);
}

function showTheory(id) {
  const panel = document.getElementById("theory-panel");
  const t = theory[id];
  if (!t) {
    panel.innerHTML = `<div class="theory-inner"><p class="placeholder" style="margin-top:60px">${lang === "en" ? `No theory written yet for «${id}».` : `Теория для «${id}» ещё не написана.`}</p></div>`;
    return;
  }

  // Support both flat (legacy) and bilingual {en, ru} structure
  const tl = t[lang] || t;

  const typeLabels = {
    en: { category:"Category", structure:"Structure", hypothesis:"Hypothesis", concept:"Concept" },
    ru: { category:"Категория", structure:"Структура", hypothesis:"Гипотеза", concept:"Концепция" }
  };
  const secLabel = lang === "en" ? "Entries" : "Записи";
  const altTitle = lang === "en" ? (t.ru && t.ru.title) || t.title_ru || "" : (t.en && t.en.title) || t.title || "";

  const rel = entries.filter(e => e.node === id);
  let entriesHtml = "";
  if (rel.length) {
    entriesHtml = `<div class="entries-section">
      <div class="sec-label">${secLabel} (${rel.length})</div>
      ${rel.map(e => `<div class="entry-card">
        <div class="et">${e.title}</div>
        <div class="em">${e.authors} · ${e.year}${e.arxiv ? ` · <a href="https://arxiv.org/abs/${e.arxiv}" target="_blank">arXiv:${e.arxiv}</a>` : ""}</div>
        <div class="ed">${lang === "en" ? (e.desc_en || e.desc) : e.desc}</div>
      </div>`).join("")}
    </div>`;
  }

  panel.innerHTML = `<div class="theory-inner">
    <h2>${tl.title}</h2>
    <div class="meta">
      <span class="type-badge type-${t.type}">${typeLabels[lang][t.type]}</span>
      <span style="color:#bbb">${altTitle}</span>
    </div>
    <p class="summary">${tl.summary}</p>
    <div class="viz-box" id="viz-box"></div>
    <div class="viz-caption" id="viz-caption"></div>
    <div class="content">${tl.content}</div>
    ${entriesHtml}
  </div>`;

  const box = document.getElementById("viz-box");
  const cap = document.getElementById("viz-caption");
  if (box && vizMap[t.viz]) {
    vizMap[t.viz](box, cap);
  } else if (box) {
    box.style.display = "none";
    if (cap) cap.style.display = "none";
  }
}

// ── torus ─────────────────────────────────────────────────
function vizTorus(el, cap) {
  const W = 580, H = 260;
  const svg = makeSVG(el, W, H);

  // --- Left: wireframe torus ---
  const R = 58, r = 26;
  const tiltX = Math.PI / 4.5, tiltZ = -Math.PI / 10;
  const cx = 145, cy = 128;

  function proj(x3, y3, z3) {
    const yr = y3*Math.cos(tiltX) - z3*Math.sin(tiltX);
    const zr = y3*Math.sin(tiltX) + z3*Math.cos(tiltX);
    const xr = x3*Math.cos(tiltZ) - yr*Math.sin(tiltZ);
    const yr2= x3*Math.sin(tiltZ) + yr*Math.cos(tiltZ);
    return [cx + xr, cy + yr2];
  }
  function torusPt(u, v) {
    return proj((R+r*Math.cos(v))*Math.cos(u),(R+r*Math.cos(v))*Math.sin(u),r*Math.sin(v));
  }

  const N=40, M=18;
  const g = svg.append("g");

  // lat lines (v fixed)
  for (let j=0; j<M; j+=2) {
    const v = 2*Math.PI*j/M;
    const pts = Array.from({length:N+1},(_,i)=>torusPt(2*Math.PI*i/N,v));
    g.append("path").attr("d","M"+pts.map(p=>p.join(",")).join("L")+"Z")
      .attr("fill","none").attr("stroke","#c5c2bb").attr("stroke-width",0.8);
  }
  // lon lines (u fixed)
  for (let i=0; i<N; i+=5) {
    const u = 2*Math.PI*i/N;
    const pts = Array.from({length:M+1},(_,j)=>torusPt(u,2*Math.PI*j/M));
    g.append("path").attr("d","M"+pts.map(p=>p.join(",")).join("L")+"Z")
      .attr("fill","none").attr("stroke","#999").attr("stroke-width",1);
  }
  svg.append("text").attr("x",cx).attr("y",H-12).attr("text-anchor","middle").attr("font-size","11px").attr("font-family","'Courier New',monospace").attr("fill","#888").text("T² = S¹ × S¹");

  // --- Right: days on S¹ ---
  const cr = 88, rcx = 410, rcy = 128;
  const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const cols = ["#e07060","#e09030","#c0b020","#40a060","#2080c0","#7060d0","#c040a0"];

  const rg = svg.append("g");
  rg.append("circle").attr("cx",rcx).attr("cy",rcy).attr("r",cr).attr("fill","none").attr("stroke","#ddd").attr("stroke-width",1.5);

  // arc arrows between consecutive days
  const defs = svg.append("defs");
  defs.append("marker").attr("id","arrowhead").attr("markerWidth",6).attr("markerHeight",4).attr("refX",5).attr("refY",2).attr("orient","auto")
    .append("polygon").attr("points","0 0, 6 2, 0 4").attr("fill","#ccc");

  days.forEach((day, i) => {
    const a = 2*Math.PI*i/days.length - Math.PI/2;
    const x = rcx + cr*Math.cos(a), y = rcy + cr*Math.sin(a);
    rg.append("circle").attr("cx",x).attr("cy",y).attr("r",8)
      .attr("fill",cols[i]).attr("stroke","white").attr("stroke-width",1.8);
    const la = 1.38;
    rg.append("text").attr("x",rcx+cr*la*Math.cos(a)).attr("y",rcy+cr*la*Math.sin(a))
      .attr("text-anchor","middle").attr("dominant-baseline","middle")
      .attr("font-size","11px").attr("fill","#333").text(day);
  });

  rg.append("text").attr("x",rcx).attr("y",rcy).attr("text-anchor","middle").attr("dominant-baseline","middle")
    .attr("font-size","11px").attr("font-family","'Courier New',monospace").attr("fill","#bbb").text("S¹");

  // cyclicity arrow (arc from Sun back toward Mon)
  const a0 = 2*Math.PI*6/7 - Math.PI/2 + 0.2;
  const a1 = 2*Math.PI*0/7 - Math.PI/2 - 0.2;
  const ra = cr + 18;
  const x0 = rcx+ra*Math.cos(a0), y0 = rcy+ra*Math.sin(a0);
  const x1 = rcx+ra*Math.cos(a1), y1 = rcy+ra*Math.sin(a1);
  rg.append("path").attr("d",`M${x0},${y0} A${ra},${ra} 0 0,1 ${x1},${y1}`)
    .attr("fill","none").attr("stroke","#ccc").attr("stroke-width",1.5)
    .attr("marker-end","url(#arrowhead)");

  cap.textContent = "Left: torus T² = S¹ × S¹ (wireframe). Right: days of week on S¹ — Sunday wraps back to Monday (Gurnee & Tegmark, 2024).";
}

// ── hyperbolic: poincaré disk with tree ───────────────────
function vizHyperbolic(el, cap) {
  const W = 400, H = 340;

  const cx = W/2, cy = H/2, R = 140;

  // Concentric reference circles
  [0.35, 0.65, 0.88].forEach(frac => {
    g.append("circle").attr("cx",cx).attr("cy",cy).attr("r",R*frac).attr("fill","none").attr("stroke","#e0ddd8").attr("stroke-width",0.8);
  });

  // Tree structure: root at center, 3 children at r=0.38, 9 grandchildren at r=0.72
  const root_pt = [cx, cy];
  const level1_angles = [-Math.PI/2, Math.PI/6, 5*Math.PI/6];
  const level1_r = R * 0.38;
  const level1_pts = level1_angles.map(a => [cx+level1_r*Math.cos(a), cy+level1_r*Math.sin(a)]);
  const level2_r = R * 0.72;

  const nodeCol = "#555";

  // Root → level1 edges

      .attr("stroke","#ccc").attr("stroke-width",1.2);
  });

  // Level1 → level2 edges and nodes
  level1_angles.forEach((a1, i) => {
    const spreadAngles = [a1 - 0.38, a1, a1 + 0.38];

      const x2 = cx + level2_r*Math.cos(a2), y2 = cy + level2_r*Math.sin(a2);

      g.append("text").attr("x",x2+(x2-cx)*0.22).attr("y",y2+(y2-cy)*0.22)
        .attr("text-anchor","middle").attr("dominant-baseline","middle")
        .attr("font-size","9px").attr("fill","#888").text(level2_labels[i][j]);
    });
  });

  // Level1 nodes
  level1_pts.forEach((pt, i) => {
    g.append("circle").attr("cx",pt[0]).attr("cy",pt[1]).attr("r",5.5).attr("fill","#777").attr("stroke","white").attr("stroke-width",1.5);

  // Root node
  g.append("circle").attr("cx",cx).attr("cy",cy).attr("r",7).attr("fill",INK).attr("stroke","white").attr("stroke-width",2);

  // Legend: radius ↔ depth in hierarchy

    .text("radius in disk ∝ depth in hierarchy");

  cap.textContent = "Poincaré disk model: tree grows exponentially, all levels equidistant from root. Hyperbolic space is natural for semantic hierarchies.";

// ── affine subspace ───────────────────────────────────────
function vizAffine(el, cap) {
  const W=500, H=260;
  const svg = makeSVG(el, W, H);

  // Simple 3D perspective: iso-ish projection
  function iso(x, y, z) {
    return [220 + x*1.0 - z*0.55, 130 - y*0.9 + z*0.35];
  }

  const g = svg.append("g");

  // Plane parallelogram
  const corners = [[0,0,0],[80,0,0],[80,0,60],[0,0,60]];
  const projected = corners.map(([x,y,z]) => iso(x,y,z));
  g.append("polygon").attr("points",projected.map(p=>p.join(",")).join(" ")).attr("fill","#e8e4d8").attr("stroke","#999").attr("stroke-width",1.2);

  // Grid lines on plane
  for (let xi=20; xi<80; xi+=20) {
    const p1=iso(xi,0,0), p2=iso(xi,0,60);

  }
  for (let zi=20; zi<60; zi+=20) {
    const p1=iso(0,0,zi), p2=iso(80,0,zi);

  // Offset point x₀

  g.append("text").attr("x",x0[0]-14).attr("y",x0[1]-8).attr("font-size","11px").attr("font-family","'Courier New',monospace").attr("fill","#333").text("x₀");

    .attr("stroke","#c04030").attr("stroke-width",2).attr("marker-end","url(#av)");
  g.append("text").attr("x",(x0[0]+e1end[0])/2).attr("y",(x0[1]+e1end[1])/2-8).attr("font-size","11px").attr("font-family","'Courier New',monospace").attr("fill","#c04030").text("e₁");

  // Basis vector e₂ (along z)
  const e2end = iso(20, 0, 20+35);
  defs.append("marker").attr("id","av2").attr("markerWidth",6).attr("markerHeight",4).attr("refX",5).attr("refY",2).attr("orient","auto")
    .append("polygon").attr("points","0 0,6 2,0 4").attr("fill","#2060c0");
  g.append("line").attr("x1",x0[0]).attr("y1",x0[1]).attr("x2",e2end[0]).attr("y2",e2end[1])
    .attr("stroke","#2060c0").attr("stroke-width",2).attr("marker-end","url(#av2)");
  g.append("text").attr("x",e2end[0]+5).attr("y",e2end[1]+2).attr("font-size","11px").attr("font-family","'Courier New',monospace").attr("fill","#2060c0").text("e₂");

  svg.append("text").attr("x",390).attr("y",110).attr("text-anchor","middle").attr("font-size","13px").attr("font-family","'Courier New',monospace").attr("fill","#333").text("A = x₀ + V");
  svg.append("text").attr("x",390).attr("y",132).attr("text-anchor","middle").attr("font-size","10.5px").attr("fill","#888").text("V = span{e₁, e₂}");
  svg.append("text").attr("x",390).attr("y",160).attr("text-anchor","middle").attr("font-size","10px").attr("fill","#aaa").text("V is a linear subspace");
  svg.append("text").attr("x",390).attr("y",176).attr("text-anchor","middle").attr("font-size","10px").attr("fill","#aaa").text("A need not contain 0");

  cap.textContent = "Affine subspace A = x₀ + V: a linear subspace V shifted by offset point x₀. Unlike linear subspaces, A need not pass through the origin.";

// ── linear direction ──────────────────────────────────────
function vizLinearDir(el, cap) {
  const W=500, H=280;
  const svg = makeSVG(el, W, H);
  const cx=160, cy=140;
  const g = svg.append("g");

  // Grid
  for (let v=-120; v<=120; v+=40) {
    g.append("line").attr("x1",cx-130).attr("y1",cy+v).attr("x2",cx+130).attr("y2",cy+v).attr("stroke","#eee").attr("stroke-width",0.8);
    g.append("line").attr("x1",cx+v).attr("y1",cy-130).attr("x2",cx+v).attr("y2",cy+130).attr("stroke","#eee").attr("stroke-width",0.8);
  }
  // Axes
  g.append("line").attr("x1",cx-130).attr("y1",cy).attr("x2",cx+130).attr("y2",cy).attr("stroke","#ccc").attr("stroke-width",1);
  g.append("line").attr("x1",cx).attr("y1",cy+130).attr("x2",cx).attr("y2",cy-130).attr("stroke","#ccc").attr("stroke-width",1);

  // Feature direction r_f
  const defs = svg.append("defs");
  defs.append("marker").attr("id","red-arr").attr("markerWidth",7).attr("markerHeight",5).attr("refX",6).attr("refY",2.5).attr("orient","auto")
    .append("polygon").attr("points","0 0,7 2.5,0 5").attr("fill","#c04030");
  defs.append("marker").attr("id","gray-arr").attr("markerWidth",6).attr("markerHeight",4).attr("refX",5).attr("refY",2).attr("orient","auto")
    .append("polygon").attr("points","0 0,6 2,0 4").attr("fill","#999");

  const rfx = 95, rfy = -75; // direction vector (unit scaled)
  g.append("line").attr("x1",cx).attr("y1",cy).attr("x2",cx+rfx).attr("y2",cy+rfy)
    .attr("stroke","#c04030").attr("stroke-width",2.5).attr("marker-end","url(#red-arr)");
  g.append("text").attr("x",cx+rfx+6).attr("y",cy+rfy-5).attr("font-size","12px").attr("font-family","'Courier New',monospace").attr("fill","#c04030").text("rᶠ");

  // Activation vectors + their projections onto r_f
  const activations = [[60,-45],[85,-15],[50,-90],[-30,40],[-55,10],[-40,55]];
  const rfMag = Math.sqrt(rfx*rfx+rfy*rfy);
  const rfUnit = [rfx/rfMag, rfy/rfMag];

  activations.forEach(([dx,dy], i) => {
    const isPos = i < 3;
    const col = isPos ? "#c04030" : "#4060a0";
    // Draw activation point
    g.append("circle").attr("cx",cx+dx).attr("cy",cy+dy).attr("r",5.5).attr("fill",col).attr("opacity",0.65);
    // Projection onto rᶠ
    const proj = dx*rfUnit[0] + dy*rfUnit[1];
    const projX = cx + proj*rfUnit[0], projY = cy + proj*rfUnit[1];
    // Dotted line from point to projection
    g.append("line").attr("x1",cx+dx).attr("y1",cy+dy).attr("x2",projX).attr("y2",projY)
      .attr("stroke",col).attr("stroke-width",0.9).attr("stroke-dasharray","3 2").attr("opacity",0.5);
    // Tick on rᶠ line
    const perpLen = 5;
    const perpX = -rfUnit[1]*perpLen, perpY = rfUnit[0]*perpLen;
    g.append("line").attr("x1",projX-perpX).attr("y1",projY-perpY).attr("x2",projX+perpX).attr("y2",projY+perpY)
      .attr("stroke",col).attr("stroke-width",1.2).attr("opacity",0.8);
  });

  // Projection axis label
  g.append("text").attr("x",cx-10).attr("y",cy+125).attr("font-size","10px").attr("font-family","'Courier New',monospace").attr("fill","#999").text("rᶠ·x > 0 → f present");

  // Right panel
  const rx = 350;
  svg.append("text").attr("x",rx).attr("y",70).attr("font-size","11px").attr("fill","#555").text("Red dots: feature present");
  svg.append("text").attr("x",rx).attr("y",88).attr("font-size","11px").attr("fill","#555").text("Blue dots: feature absent");
  svg.append("text").attr("x",rx).attr("y",120).attr("font-size","11px").attr("font-family","'Courier New',monospace").attr("fill","#333").text("rᶠ · x ≈ value(f)");
  svg.append("text").attr("x",rx).attr("y",150).attr("font-size","10px").attr("fill","#888").text("Dashes show projection");
  svg.append("text").attr("x",rx).attr("y",167).attr("font-size","10px").attr("fill","#888").text("of each activation onto rᶠ");
  svg.append("text").attr("x",rx).attr("y",200).attr("font-size","10px").attr("fill","#bbb").text("‖rᶠ‖ = 1  (unit vector)");

  cap.textContent = "Feature direction rᶠ in activation space. Red activations (feature present) project positively onto rᶠ; blue (absent) project negatively. Dashed lines show projections.";
}

  svg.append("text").attr("x",185).attr("y",165).attr("text-anchor","middle").attr("font-size","9.5px").attr("fill","#aaa").text("linear structure ↔ separability");
  svg.append("text").attr("x",355).attr("y",165).attr("text-anchor","middle").attr("font-size","9.5px").attr("fill","#aaa").text("universal structure?");

  cap.textContent = "Three major hypotheses about LLM representations. LRH and Platonic Rep. are mutually reinforcing; Superposition challenges a naive LRH.";
}

// ── LRH: vector arithmetic diagram ───────────────────────
function vizLRH(el, cap) {
  const W=520, H=300;
  const svg = makeSVG(el, W, H);
  const cx=160, cy=160;
  const g = svg.append("g");

  // Grid
  for (let v=-120; v<=120; v+=40) {
    g.append("line").attr("x1",cx-130).attr("y1",cy+v).attr("x2",cx+130).attr("y2",cy+v).attr("stroke","#eee").attr("stroke-width",0.8);
    g.append("line").attr("x1",cx+v).attr("y1",cy-130).attr("x2",cx+v).attr("y2",cy+130).attr("stroke","#eee").attr("stroke-width",0.8);
  }
  g.append("line").attr("x1",cx-130).attr("y1",cy).attr("x2",cx+130).attr("y2",cy).attr("stroke","#ccc").attr("stroke-width",1);
  g.append("line").attr("x1",cx).attr("y1",cy+130).attr("x2",cx).attr("y2",cy-130).attr("stroke","#ccc").attr("stroke-width",1);

  // Four points: man, king, woman, queen
  // man at (-60, 30), king at (-60,-60), woman at (60,30), queen at (60,-60)
  const man   = [cx-70, cy+40];
  const king  = [cx-70, cy-60];
  const woman = [cx+60, cy+40];
  const queen = [cx+60, cy-60];

  const defs = svg.append("defs");
  function makeArr(id, col) {
    defs.append("marker").attr("id",id).attr("markerWidth",7).attr("markerHeight",5).attr("refX",6).attr("refY",2.5).attr("orient","auto")
      .append("polygon").attr("points","0 0,7 2.5,0 5").attr("fill",col);
  }
  makeArr("arr-gender","#9060d0");
  makeArr("arr-royalty","#c06030");
  makeArr("arr-result","#30a060");

  // Gender arrows (man→woman, king→queen) — purple
  [[man,woman],[king,queen]].forEach(([s,e]) => {
    g.append("line").attr("x1",s[0]).attr("y1",s[1]).attr("x2",e[0]-4).attr("y2",e[1])
      .attr("stroke","#9060d0").attr("stroke-width",1.8).attr("marker-end","url(#arr-gender)");
  });

  // Royalty arrows (man→king, woman→queen) — orange
  [[man,king],[woman,queen]].forEach(([s,e]) => {
    g.append("line").attr("x1",s[0]).attr("y1",s[1]).attr("x2",e[0]).attr("y2",e[1]+5)
      .attr("stroke","#c06030").attr("stroke-width",1.8).attr("marker-end","url(#arr-royalty)");
  });

  // king - man + woman → queen (result arrow, dashed green)
  g.append("line").attr("x1",king[0]).attr("y1",king[1]).attr("x2",queen[0]-4).attr("y2",queen[1])
    .attr("stroke","#30a060").attr("stroke-width",2.5).attr("stroke-dasharray","6 3").attr("marker-end","url(#arr-result)");

  // Dots
  [[man,"man","#555"],[king,"king","#c06030"],[woman,"woman","#555"],[queen,"queen","#30a060"]].forEach(([pt,lbl,col]) => {
    g.append("circle").attr("cx",pt[0]).attr("cy",pt[1]).attr("r",6).attr("fill",col).attr("stroke","white").attr("stroke-width",1.5);
    g.append("text").attr("x",pt[0]).attr("y",pt[1]-12).attr("text-anchor","middle").attr("font-size","11px").attr("fill","#333").text(lbl);
  });

  // Legend
  const lx=340, ly=80;
  [[`#9060d0`,"gender direction"],[`#c06030`,"royalty direction"],[`#30a060`,"king−man+woman≈queen"]].forEach(([col,label],i) => {
    svg.append("line").attr("x1",lx).attr("y1",ly+i*22).attr("x2",lx+24).attr("y2",ly+i*22).attr("stroke",col).attr("stroke-width",i===2?2.5:1.8).attr("stroke-dasharray",i===2?"6 3":null);
    svg.append("text").attr("x",lx+30).attr("y",ly+i*22+4).attr("font-size","10.5px").attr("fill","#555").text(label);
  });

  // Formula
  svg.append("text").attr("x",370).attr("y",200).attr("text-anchor","middle").attr("font-size","12px").attr("font-family","'Courier New',monospace").attr("fill","#30a060").text("king − man + woman");
  svg.append("text").attr("x",370).attr("y",218).attr("text-anchor","middle").attr("font-size","12px").attr("font-family","'Courier New',monospace").attr("fill","#30a060").text("≈ queen");

  cap.textContent = "Linear feature arithmetic (Word2Vec style): gender and royalty are linearly encoded directions. king − man + woman ≈ queen is a parallelogram in activation space.";
}

// ── platonic representation ───────────────────────────────
function vizPlatonic(el, cap) {
  const W=560, H=300;
  const svg = makeSVG(el, W, H);

  const models = [
    { label:"Language Model (GPT)", cx:140, concepts:["dog","cat","tree","car","house"] },
    { label:"Vision Model (ViT)",   cx:420, concepts:["dog","cat","tree","car","house"] },
  ];

  const conceptAngles = [0, 72, 144, 216, 288].map(d => d*Math.PI/180 - Math.PI/2);
  const CR = 80;
  const cy = 155;
  const cols = ["#c04030","#4060a0","#50a060","#c08030","#9060d0"];

  // Central CKA indicator
  svg.append("text").attr("x",280).attr("y",100).attr("text-anchor","middle").attr("font-size","10.5px").attr("fill","#888").text("CKA similarity");
  svg.append("text").attr("x",280).attr("y",116).attr("text-anchor","middle").attr("font-size","14px").attr("font-weight","bold").attr("fill","#30a060").text("0.87");
  svg.append("text").attr("x",280).attr("y",136).attr("text-anchor","middle").attr("font-size","9px").attr("fill","#bbb").text("(after scaling)");

  models.forEach(({label, cx, concepts}) => {
    // Circle
    svg.append("circle").attr("cx",cx).attr("cy",cy).attr("r",CR+20).attr("fill","none").attr("stroke","#ddd").attr("stroke-width",1.5);
    svg.append("text").attr("x",cx).attr("y",cy+CR+38).attr("text-anchor","middle").attr("font-size","11px").attr("font-weight","bold").attr("fill","#444").text(label);

    // Concepts
    concepts.forEach((c, i) => {
      const a = conceptAngles[i];
      const x = cx + CR*Math.cos(a), y = cy + CR*Math.sin(a);
      svg.append("circle").attr("cx",x).attr("cy",y).attr("r",6).attr("fill",cols[i]).attr("stroke","white").attr("stroke-width",1.5);
      const lx = cx + (CR+16)*Math.cos(a), ly = cy + (CR+16)*Math.sin(a);
      svg.append("text").attr("x",lx).attr("y",ly).attr("text-anchor","middle").attr("dominant-baseline","middle").attr("font-size","9.5px").attr("fill","#555").text(c);
    });
  });

  // Connecting lines between same concepts
  conceptAngles.forEach((a, i) => {
    const x1 = 140+CR*Math.cos(a), y1 = cy+CR*Math.sin(a);
    const x2 = 420+CR*Math.cos(a), y2 = cy+CR*Math.sin(a);
    svg.append("line").attr("x1",x1).attr("y1",y1).attr("x2",x2).attr("y2",y2)
      .attr("stroke",cols[i]).attr("stroke-width",1).attr("stroke-dasharray","4 3").attr("opacity",0.5);
  });

  cap.textContent = "Two models (language + vision) converge to similar geometric relationships between the same concepts — measured by CKA. This is the Platonic Representation (Huh et al., 2024).";
}
